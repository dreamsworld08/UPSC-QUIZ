<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC Quiz — Admin Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1520;
    --card: #231e2b;
    --card-alt: #2a2435;
    --accent: #c084fc;
    --accent-dim: rgba(192,132,252,0.15);
    --gold: #fbbf24;
    --silver: #94a3b8;
    --bronze: #d97706;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --text: #ede9f5;
    --text-dim: #9b93a8;
    --border: #352f40;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeIn 0.6s ease;
  }

  .header .badge {
    display: inline-block;
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header p {
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    animation: fadeIn 0.6s ease 0.1s both;
  }

  .controls-left {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-refresh {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-refresh:hover { background: var(--accent); color: var(--bg); }

  .btn-clear {
    background: rgba(248,113,113,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-clear:hover { background: var(--red); color: #fff; }

  .btn-export {
    background: rgba(52,211,153,0.1);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-export:hover { background: var(--green); color: var(--bg); }

  .total-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .total-badge span { color: var(--accent); font-size: 18px; }

  /* Summary cards */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
    animation: fadeIn 0.6s ease 0.2s both;
  }

  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }

  .summary-card .s-val {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
  }

  .summary-card .s-val.purple { color: var(--accent); }
  .summary-card .s-val.green { color: var(--green); }
  .summary-card .s-val.amber { color: var(--amber); }
  .summary-card .s-val.red { color: var(--red); }

  .summary-card .s-lbl {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* Table */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeIn 0.6s ease 0.3s both;
  }

  .table-scroll { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 620px;
  }

  thead th {
    background: var(--card-alt);
    padding: 14px 16px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: color 0.2s;
    white-space: nowrap;
  }

  thead th:hover { color: var(--accent); }
  thead th.sorted { color: var(--accent); }

  thead th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    font-size: 10px;
    opacity: 0.4;
  }

  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--card-alt); }

  td {
    padding: 14px 16px;
    font-size: 14px;
    white-space: nowrap;
  }

  .rank-cell {
    font-weight: 700;
    font-size: 16px;
    width: 50px;
    text-align: center;
  }

  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }

  .medal { font-size: 18px; }

  .name-cell { font-weight: 600; }

  .score-cell {
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
  }

  .pct-cell { font-weight: 600; }
  .pct-high { color: var(--green); }
  .pct-mid { color: var(--amber); }
  .pct-low { color: var(--red); }

  .correct-cell { color: var(--green); }
  .wrong-cell { color: var(--red); }
  .timeout-cell { color: var(--amber); }

  .date-cell { color: var(--text-dim); font-size: 13px; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top: 3px solid var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  /* Confirm modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 380px;
    width: 90%;
    text-align: center;
  }

  .modal-box h3 { font-size: 18px; margin-bottom: 10px; }
  .modal-box p { font-size: 14px; color: var(--text-dim); margin-bottom: 22px; }

  .modal-btns { display: flex; gap: 12px; justify-content: center; }

  .modal-btns button {
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    border: none;
    transition: opacity 0.2s;
  }

  .modal-btns button:hover { opacity: 0.85; }
  .btn-cancel { background: var(--card-alt); color: var(--text); border: 1px solid var(--border) !important; }
  .btn-confirm-del { background: var(--red); color: #fff; }

  /* Search */
  .search-box {
    background: var(--card-alt);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }

  .search-box::placeholder { color: var(--text-dim); opacity: 0.5; }
  .search-box:focus { border-color: var(--accent); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .container { padding: 20px 12px 40px; }
    .controls { flex-direction: column; align-items: stretch; }
    .controls-left { flex-direction: column; }
    .search-box { width: 100%; }
    .btn-refresh, .btn-clear, .btn-export { width: 100%; text-align: center; }
    .total-badge { text-align: center; }
    .summary-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .summary-card { padding: 14px; }
    .summary-card .s-val { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">Admin Only</div>
    <h1>Quiz Leaderboard</h1>
    <p>UPSC Introductory Quiz — Student Performance</p>
  </div>

  <div class="controls">
    <div class="controls-left">
      <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
      <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
      <button class="btn-clear" onclick="showClearModal()">✕ Clear All</button>
    </div>
    <input type="text" class="search-box" id="search" placeholder="Search student..." oninput="renderTable()">
  </div>

  <div class="summary-row">
    <div class="summary-card"><div class="s-val purple" id="sum-total">—</div><div class="s-lbl">Total Attempts</div></div>
    <div class="summary-card"><div class="s-val green" id="sum-avg">—</div><div class="s-lbl">Avg Score</div></div>
    <div class="summary-card"><div class="s-val amber" id="sum-top">—</div><div class="s-lbl">Top Score</div></div>
    <div class="summary-card"><div class="s-val red" id="sum-low">—</div><div class="s-lbl">Lowest Score</div></div>
  </div>

  <div class="table-wrap">
    <div id="table-content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading leaderboard...</p>
      </div>
    </div>
  </div>
</div>

<!-- Clear confirmation modal -->
<div class="modal-overlay" id="clear-modal">
  <div class="modal-box">
    <h3>Clear All Data?</h3>
    <p>This will permanently delete all student scores. This action cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="hideClearModal()">Cancel</button>
      <button class="btn-confirm-del" onclick="clearAllData()">Delete All</button>
    </div>
  </div>
</div>

<script>
const BLOB_ID = '019d75db-a283-7d2a-8e1c-7bb9adcd06c1';
const BLOB_URL = 'https://jsonblob.com/api/jsonBlob/' + BLOB_ID;

let leaderboard = [];
let sortCol = 'score';
let sortDir = 'desc';

async function loadData() {
  const content = document.getElementById('table-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading leaderboard...</p></div>';

  try {
    const res = await fetch(BLOB_URL);
    const data = await res.json();
    leaderboard = data.leaderboard || [];
    updateSummary();
    renderTable();
  } catch (e) {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠</div><h3>Failed to Load</h3><p>Could not connect to the database. Please try again.</p></div>';
  }
}

function updateSummary() {
  const n = leaderboard.length;
  document.getElementById('sum-total').textContent = n;

  if (n === 0) {
    document.getElementById('sum-avg').textContent = '—';
    document.getElementById('sum-top').textContent = '—';
    document.getElementById('sum-low').textContent = '—';
    return;
  }

  const scores = leaderboard.map(e => e.score);
  const avg = (scores.reduce((a, b) => a + b, 0) / n).toFixed(1);
  document.getElementById('sum-avg').textContent = avg + '/15';
  document.getElementById('sum-top').textContent = Math.max(...scores) + '/15';
  document.getElementById('sum-low').textContent = Math.min(...scores) + '/15';
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    sortCol = col;
    sortDir = col === 'name' || col === 'date' ? 'asc' : 'desc';
  }
  renderTable();
}

function renderTable() {
  const content = document.getElementById('table-content');
  const query = document.getElementById('search').value.trim().toLowerCase();

  let filtered = leaderboard;
  if (query) {
    filtered = leaderboard.filter(e => e.name.toLowerCase().includes(query));
  }

  // Sort
  const sorted = [...filtered].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'name') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (sortCol === 'date') { va = new Date(va); vb = new Date(vb); }
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  if (sorted.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><h3>No Results</h3><p>' + (query ? 'No students match your search.' : 'No students have attempted the quiz yet.') + '</p></div>';
    return;
  }

  const cols = [
    { key: 'rank', label: '#' },
    { key: 'name', label: 'Student Name' },
    { key: 'score', label: 'Score' },
    { key: 'percentage', label: '%' },
    { key: 'correct', label: 'Correct' },
    { key: 'wrong', label: 'Wrong' },
    { key: 'timeout', label: 'Timed Out' },
    { key: 'date', label: 'Date & Time' }
  ];

  let html = '<div class="table-scroll"><table><thead><tr>';
  cols.forEach(c => {
    const isSorted = sortCol === c.key;
    const arrow = c.key === 'rank' ? '' : `<span class="sort-arrow">${isSorted ? (sortDir === 'asc' ? '▲' : '▼') : '▲'}</span>`;
    const cls = isSorted ? ' class="sorted"' : '';
    const click = c.key === 'rank' ? '' : ` onclick="sortBy('${c.key}')"`;
    html += `<th${cls}${click}>${c.label}${arrow}</th>`;
  });
  html += '</tr></thead><tbody>';

  sorted.forEach((entry, i) => {
    const rank = i + 1;
    let rankClass = rank <= 3 ? ` rank-${rank}` : '';
    let medal = rank === 1 ? ' 🥇' : rank === 2 ? ' 🥈' : rank === 3 ? ' 🥉' : '';

    let pctClass = entry.percentage >= 80 ? 'pct-high' : entry.percentage >= 50 ? 'pct-mid' : 'pct-low';

    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) + ', ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });

    html += `<tr>
      <td class="rank-cell${rankClass}">${rank}${medal}</td>
      <td class="name-cell">${escapeHtml(entry.name)}</td>
      <td class="score-cell">${entry.score}/15</td>
      <td class="pct-cell ${pctClass}">${entry.percentage}%</td>
      <td class="correct-cell">${entry.correct}</td>
      <td class="wrong-cell">${entry.wrong}</td>
      <td class="timeout-cell">${entry.timeout}</td>
      <td class="date-cell">${dateStr}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function exportCSV() {
  if (leaderboard.length === 0) return;

  let csv = 'Rank,Student Name,Score,Percentage,Correct,Wrong,Timed Out,Date\n';

  const sorted = [...leaderboard].sort((a, b) => b.score - a.score);
  sorted.forEach((e, i) => {
    const d = new Date(e.date);
    const dateStr = d.toLocaleDateString('en-IN') + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    csv += `${i + 1},"${e.name}",${e.score},${e.percentage}%,${e.correct},${e.wrong},${e.timeout},"${dateStr}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'upsc_quiz_leaderboard.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function showClearModal() {
  document.getElementById('clear-modal').classList.add('show');
}

function hideClearModal() {
  document.getElementById('clear-modal').classList.remove('show');
}

async function clearAllData() {
  hideClearModal();
  try {
    await fetch(BLOB_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ leaderboard: [] })
    });
    leaderboard = [];
    updateSummary();
    renderTable();
  } catch (e) {
    alert('Failed to clear data. Please try again.');
  }
}

// Load on page open
loadData();

// Auto-refresh every 30 seconds
setInterval(loadData, 30000);
</script>
</body>
</html>
